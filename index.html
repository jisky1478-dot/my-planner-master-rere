<style>
:root{
  --bg:#faf9f7;--surface:#fff;--surface2:#f4f2ef;--surface3:#ece9e4;
  --border:#e2dfd9;--border2:#ccc9c2;
  --text:#1c1b18;--text2:#5a5751;--text3:#9a9690;
  --green:#2a7d4f;--green-bg:#e8f5ee;--green-light:#d1eddd;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;
  --amber:#9a6200;--amber-bg:#fdf3dc;
  --coral:#b03a2e;--coral-bg:#fbeae8;
  --accent:#1c1b18;
  --radius:12px;--radius-sm:8px;
  --nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px);
  --font-body:'Noto Sans KR',sans-serif;
  --font-serif:'DM Serif Display',serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#18181a;--surface:#242426;--surface2:#2e2e30;--surface3:#38383a;
  --border:#3a3a3c;--border2:#4a4a4e;
  --text:#f0ede8;--text2:#9a9690;--text3:#5a5751;
  --green:#4caf78;--green-bg:#1a3326;--green-light:#1e3d2a;
  --blue:#5b9bd5;--blue-bg:#1a2a3e;
  --amber:#e0aa44;--amber-bg:#2e2210;
  --coral:#e07060;--coral-bg:#2e1a18;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 calc(var(--nav-h) + var(--safe-b) + 12px);-webkit-overflow-scrolling:touch;scrollbar-width:none}
#screen::-webkit-scrollbar{display:none}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 32px;text-align:center}
.login-logo{font-size:52px;margin-bottom:12px}
.login-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:40px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 24px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:15px;font-weight:500;font-family:var(--font-body);color:var(--text);transition:background .15s}
.google-btn:hover,.google-btn:active{background:var(--surface2)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.lf-list{margin-top:32px;display:flex;flex-direction:column;gap:10px;text-align:left;width:100%}
.lf-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.lf-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* SYNC BAR */
#sync-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:200;pointer-events:none}
.sync-chip{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 14px;font-size:11px;font-weight:500;border-radius:0 0 10px 10px}
.sync-chip.syncing{background:var(--amber-bg);color:var(--amber)}
.sync-chip.synced{background:var(--green-bg);color:var(--green)}
.sync-chip.offline{background:var(--coral-bg);color:var(--coral)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-chip.syncing .sync-dot{animation:pulse .7s infinite}

/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:0.5px solid var(--border);padding-bottom:var(--safe-b);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0 8px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:var(--font-body);font-size:10px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.5;fill:none;stroke:currentColor}
.nav-btn.active svg{stroke-width:2}

/* HEADER */
.screen-header{padding:16px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;min-height:56px}
.screen-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.header-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* IDENTITY */
#identity-banner{margin:12px 16px 8px;background:var(--accent);color:#fff;border-radius:var(--radius);padding:14px 18px;cursor:pointer;overflow:hidden;position:relative}
#identity-banner::before{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06)}
.id-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.6;margin-bottom:4px}
.id-text{font-family:var(--font-serif);font-size:15px;line-height:1.4;font-style:italic}

/* SENTENCE */
.sentence-card{margin:0 16px 10px;border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;background:var(--surface)}
.sent-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.sent-label::after{content:' ✎'}
.sent-quote{font-family:var(--font-serif);font-size:15px;line-height:1.6;font-style:italic}
.sent-empty{font-size:13px;color:var(--text3);font-style:italic}

/* STREAK */
.streak-row{display:flex;gap:8px;padding:0 16px;margin-bottom:10px}
.streak-chip{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;flex:1;text-align:center}
.s-num{font-size:22px;font-weight:700;line-height:1}
.s-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.streak-chip.hl{background:var(--green-bg);border-color:var(--green-light)}
.streak-chip.hl .s-num{color:var(--green)}
.prog{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s}

/* HABIT QUICK */
.habit-quick{padding:0 16px;margin-bottom:10px}
.hq-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.hq-scroll::-webkit-scrollbar{display:none}
.hq-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:99px;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;white-space:nowrap}
.hq-chip.done{background:var(--green-bg);border-color:var(--green-light)}
.hq-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hq-name{font-size:12px;font-weight:500;color:var(--text2)}
.hq-chip.done .hq-name{color:var(--green)}
.hq-chk{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hq-chip.done .hq-chk{background:var(--green);border-color:var(--green)}
.hq-chip.done .hq-chk::after{content:'';display:block;width:4px;height:6px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}

/* ITEMS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;transition:opacity .15s}
.item-row.done{opacity:.5}
.item-row.done .item-text{text-decoration:line-through}
.chkbox{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chkbox.on{background:var(--green);border-color:var(--green)}
.chkbox.on::after{content:'';display:block;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.item-text{flex:1;font-size:13px;line-height:1.4}
.itag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;flex-shrink:0}
.t-paper{background:var(--green-bg);color:var(--green)}
.t-english{background:var(--blue-bg);color:var(--blue)}
.t-excel{background:#e8f5e8;color:#1a5a1a}
.t-exercise{background:var(--coral-bg);color:var(--coral)}
.t-other{background:var(--surface2);color:var(--text3)}
.tblock-row{display:flex;gap:10px;margin-bottom:6px}
.tslot{font-size:10px;color:var(--text3);min-width:40px;padding-top:12px;text-align:right;flex-shrink:0}

/* DONE BANNER */
.done-banner{margin:0 16px 10px;background:var(--green-bg);border:0.5px solid var(--green-light);border-radius:var(--radius);padding:18px;text-align:center}
.done-icon{font-size:28px;margin-bottom:6px}
.done-msg{font-family:var(--font-serif);font-size:16px;color:var(--green);font-style:italic}
.done-sub{font-size:11px;color:var(--text2);margin-top:4px}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.pop-anim{animation:pop .3s ease}

/* BTNS */
.btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text2);font-family:var(--font-body);transition:all .15s}
.btn:hover,.btn:active{background:var(--surface2)}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.pri:hover{opacity:.88}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.full{width:100%;padding:12px;font-weight:500;font-size:14px}
.btn.ghost{border-color:transparent;color:var(--text3)}
.btn.danger{color:var(--coral);border-color:var(--coral)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 4px;flex-shrink:0}
.del-btn:hover{color:var(--coral)}

/* FORM */
input,textarea,select{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:var(--font-body);background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px;line-height:1.6}
.fgroup{margin-bottom:12px}
.flabel{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.form-area{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:12px}

/* SECTION */
.section{padding:0 16px;margin-bottom:4px}
.sec-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-left:2px}
.divider{border:none;border-top:0.5px solid var(--border);margin:12px 0}
.date-nav-row{display:flex;align-items:center;gap:6px}
.d-disp{font-size:14px;font-weight:500;min-width:120px;text-align:center}
.today-pill{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--green-bg);color:var(--green);font-weight:500;margin-left:6px}

/* WEEKLY */
.week-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:flex-start;gap:12px}
.week-card.today{border-color:var(--accent);border-width:1px}
.wc-left{min-width:44px}
.wc-day{font-size:13px;font-weight:500}
.wc-date{font-size:11px;color:var(--text3)}
.wc-right{flex:1;min-width:0}
.wc-bar{height:3px;background:var(--surface3);border-radius:99px;margin-bottom:6px;overflow:hidden}
.wc-bar-fill{height:100%;background:var(--green);border-radius:99px}
.wc-sent{font-size:11px;color:var(--text3);font-style:italic;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-pct{font-size:16px;font-weight:700;min-width:36px;text-align:right}

/* MONTHLY */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 16px;margin-bottom:8px}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:6px;cursor:pointer;border:0.5px solid transparent}
.cal-day.today{border-color:var(--accent)}
.cal-day.today .cd-num{font-weight:700;color:var(--accent)}
.cd-num{font-size:13px}
.cd-dots{display:flex;gap:2px;justify-content:center}
.cd-dot{width:5px;height:5px;border-radius:50%}
.cd-pct{font-size:8px;color:var(--text3)}

/* HABITS */
.habit-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.hi-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hi-name{font-size:14px;font-weight:500;flex:1}
.hi-streak{font-size:12px;color:var(--text3)}
.hi-heatmap{display:flex;gap:3px;flex-wrap:wrap}
.hm-cell{width:14px;height:14px;border-radius:3px;background:var(--surface3)}
.hm-cell.done{background:var(--green)}
.hm-cell.today-cell{outline:1.5px solid var(--accent);outline-offset:1px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;margin-bottom:12px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:3px}

/* TPLS */
.tpl-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tpl-pill{background:none;border:0.5px solid var(--border2);border-radius:99px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font-body)}
.tpl-pill:hover{background:var(--surface2)}

/* COLOR SWATCHES */
.color-swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.swatch.selected{transform:scale(1.2);border-color:var(--text)}

/* REVIEW */
.wr-q{font-size:13px;font-weight:500;margin-bottom:6px}
.empty-state{text-align:center;padding:28px 20px;color:var(--text3);font-size:13px;line-height:1.7}
.hint{font-size:11px;color:var(--text3);text-align:center;padding:6px 0}
</style>
</head>

<script>
(function(){
const TAGS=['논문·연구','영어','엑셀','운동','기타'];
const TC={'논문·연구':'t-paper','영어':'t-english','엑셀':'t-excel','운동':'t-exercise','기타':'t-other'};
const TIMES=[];for(let h=5;h<24;h++){TIMES.push(p2(h)+':00');TIMES.push(p2(h)+':30');}
const WD=['일','월','화','수','목','금','토'];
const COLORS=['#2a7d4f','#1a5fa8','#9a6200','#b03a2e','#5b3fa0','#1a7a6e'];
const TEMPLATES=[
  {label:'영어 30분',time:'07:00',tag:'영어',title:'영어 공부 — 30분',detail:'단어·듣기·독해 중 하나'},
  {label:'논문 읽기',time:'09:00',tag:'논문·연구',title:'논문 읽기 — 1편',detail:'집중 독해 + 메모'},
  {label:'엑셀 20분',time:'12:30',tag:'엑셀',title:'엑셀 강의 — 1강',detail:'점심 후 짧게'},
  {label:'운동',time:'18:30',tag:'운동',title:'운동 — 40분',detail:'걷기·러닝·헬스'},
];
const QUOTES=['작은 1%의 개선이 매일 쌓이면 1년 후 37배 더 나아진다.','목표가 아닌 시스템에 집중하라. 결과는 시스템의 산물이다.','정체성이 먼저다. 나는 연구자다라는 믿음이 행동을 만든다.','두 번 연속 놓치지 마라. 한 번 놓쳐도 습관은 살아있다.','환경을 설계하라. 좋은 습관은 마찰을 줄이는 데서 시작된다.','2분 규칙: 새 습관은 2분 안에 시작할 수 있어야 한다.','보상이 있어야 반복된다. 오늘의 작은 완료가 내일의 동기다.'];

const S={tab:'today',date:today(),wkStart:weekOf(today()),moStart:monthOf(today()),editDay:false,editSent:false,plans:{},sentences:{},habits:[],habitLogs:{},identity:'나는 매일 조금씩 성장하는 연구자다.',weeklyReview:{},syncStatus:'synced',uid:null,selColor:COLORS[0]};

let db=null,auth=null,unsub=null;

// ── Firebase init ──
const isConfigured = FIREBASE_CONFIG.apiKey !== '여기에_apiKey_붙여넣기';

function initFirebase(){
  if(!isConfigured){
    document.getElementById('login-screen').innerHTML=`<div style="padding:32px;text-align:center"><div style="font-size:40px;margin-bottom:16px">⚙️</div><div style="font-size:18px;font-weight:700;margin-bottom:12px">Firebase 설정 필요</div><div style="font-size:13px;color:var(--text2);line-height:1.9"><b>index.html</b> 파일 상단의<br><code style="background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:12px">FIREBASE_CONFIG</code> 값을<br>본인 Firebase 프로젝트 설정으로 교체하세요.<br><br>아래 순서로 진행하세요:<br>1. firebase.google.com 접속<br>2. 프로젝트 만들기<br>3. Firestore Database 생성<br>4. Authentication → Google 로그인 활성화<br>5. 프로젝트 설정 → 웹 앱 → SDK 설정값 복사<br>6. index.html 상단 FIREBASE_CONFIG에 붙여넣기</div></div>`;
    return;
  }
  firebase.initializeApp(FIREBASE_CONFIG);
  db=firebase.firestore();
  auth=firebase.auth();
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  auth.onAuthStateChanged(user=>{
    if(user){
      S.uid=user.uid;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      startSync();
    } else {
      document.getElementById('login-screen').style.display='flex';
      document.getElementById('app').style.display='none';
    }
  });
}

function startSync(){
  if(unsub) unsub();
  const ref=db.collection('users').doc(S.uid).collection('planner').doc('data');
  unsub=ref.onSnapshot(snap=>{
    if(snap.exists){
      const d=snap.data();
      S.plans=d.plans||{};S.sentences=d.sentences||{};S.habits=d.habits||[];
      S.habitLogs=d.habitLogs||{};if(d.identity)S.identity=d.identity;S.weeklyReview=d.weeklyReview||{};
    }
    setSyncStatus('synced');render();
  },()=>setSyncStatus('offline'));
}

async function save(){
  if(!db||!S.uid)return;
  setSyncStatus('syncing');
  try{
    await db.collection('users').doc(S.uid).collection('planner').doc('data').set({
      plans:S.plans,sentences:S.sentences,habits:S.habits,habitLogs:S.habitLogs,
      identity:S.identity,weeklyReview:S.weeklyReview,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
    setSyncStatus('synced');
  }catch(e){setSyncStatus('offline');}
}

function setSyncStatus(status){
  S.syncStatus=status;
  const bar=document.getElementById('sync-bar');if(!bar)return;
  const msgs={syncing:'동기화 중...',synced:'동기화 완료',offline:'오프라인 — 로컬 저장'};
  bar.style.display='block';
  bar.innerHTML=`<div class="sync-chip ${status}"><div class="sync-dot"></div>${msgs[status]}</div>`;
  if(status==='synced')setTimeout(()=>{if(S.syncStatus==='synced')bar.style.display='none';},2000);
}

document.getElementById('google-btn').onclick=()=>{

// ── Helpers ──
function today(){const d=new Date();return ymd(d);}
function ymd(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function addDays(s,n){const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return ymd(d);}
function weekOf(s){const d=new Date(s+'T12:00:00');d.setDate(d.getDate()-d.getDay());return ymd(d);}
function monthOf(s){return s.slice(0,7)+'-01';}
function fmtDate(s){const d=new Date(s+'T12:00:00');return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WD[d.getDay()]+')';}
function fmtWR(s){const e=addDays(s,6);const ds=new Date(s+'T12:00:00'),de=new Date(e+'T12:00:00');return (ds.getMonth()+1)+'/'+ds.getDate()+' — '+(de.getMonth()+1)+'/'+de.getDate();}
function fmtMo(s){const d=new Date(s+'T12:00:00');return d.getFullYear()+'년 '+(d.getMonth()+1)+'월';}
function getPlan(dt){return S.plans[dt]||(S.plans[dt]={goals:[],blocks:[],review:''},S.plans[dt]);}
function pStats(dt){const p=getPlan(dt);const t=p.goals.length+p.blocks.length;const d=p.goals.filter(g=>g.done).length+p.blocks.filter(b=>b.done).length;return{t,d,pct:t>0?Math.round(d/t*100):0};}
function hDone(hid,dt){return(S.habitLogs[dt]||[]).includes(hid);}
function hStreak(hid){let s=0,d=today();for(let i=0;i<365;i++){if(!hDone(hid,d)){if(i>0)break;}else s++;d=addDays(d,-1);}return s;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function calcStreaks(){
  let streak=0,d=today();for(let i=0;i<365;i++){const ss=pStats(d);if(ss.t>0&&ss.pct===100)streak++;else if(i>0)break;d=addDays(d,-1);}
  let best=0,cur=0,d2=today();for(let i=0;i<365;i++){const ss=pStats(d2);if(ss.t>0&&ss.pct===100){cur++;if(cur>best)best=cur;}else cur=0;d2=addDays(d2,-1);}
  return{streak,best,active:Object.keys(S.plans).filter(dt=>getPlan(dt).goals.length+getPlan(dt).blocks.length>0).length};
}
function quote(){return QUOTES[new Date().getDate()%QUOTES.length];}

window.switchTab=function(tab){S.tab=tab;S.editDay=false;S.editSent=false;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));render();};

  else scr.innerHTML=renderMe();
}

  return hdr+idHtml+sentHtml+strHtml+hqHtml+doneBanner+goalsHtml+`<div style="height:8px"></div>`+blocksHtml+`<div style="height:8px"></div>`

function renderWeekly(){
  const days=[];for(let i=0;i<7;i++)days.push(addDays(S.wkStart,i));
  const td=today();
  const wt=days.reduce((a,dt)=>{const s=pStats(dt);return{t:a.t+s.t,d:a.d+s.d};},{t:0,d:0});
  const wp=wt.t>0?Math.round(wt.d/wt.t*100):0;
  const wkr=S.weeklyReview[S.wkStart]||{q1:'',q2:'',q3:''};
  const rows=days.map(dt=>{
    const d=new Date(dt+'T12:00:00');const s=pStats(dt);const isT=dt===td;
    const p=getPlan(dt);const tc={};
    [...p.goals,...p.blocks].forEach(item=>{const t=item.tag||'기타';tc[t]=(tc[t]||0)+1;});
    const pills=Object.entries(tc).slice(0,4).map(([t,c])=>`<span class="itag ${TC[t]||'t-other'}" style="font-size:9px">${t} ${c}</span>`).join(' ');

      <div class="wc-right">${s.t>0?`<div class="wc-bar"><div class="wc-bar-fill" style="width:${s.pct}%"></div></div><div style="display:flex;gap:4px;flex-wrap:wrap">${pills}</div>`:`<div style="font-size:12px;color:var(--text3)">계획 없음</div>`}${sent?`<div class="wc-sent">"${esc(sent)}"</div>`:''}</div>

    <div class="stat-card"><div class="stat-n">${wt.t}</div><div class="stat-l">주간 전체</div></div>
    <div class="stat-card"><div class="stat-n">${wt.d}</div><div class="stat-l">완료</div></div>

    <div class="wr-q">이번 주 가장 잘한 것은?</div><textarea id="wr-q1" style="margin-bottom:10px;min-height:52px">${esc(wkr.q1)}</textarea>
    <div class="wr-q">아쉬웠던 점과 원인은?</div><textarea id="wr-q2" style="margin-bottom:10px;min-height:52px">${esc(wkr.q2)}</textarea>
    <div class="wr-q">다음 주 단 하나의 집중 목표는?</div><textarea id="wr-q3" style="margin-bottom:10px;min-height:52px">${esc(wkr.q3)}</textarea>
    <button class="btn full" data-a="save-wr">주간 회고 저장</button>

function renderMonthly(){
  const ms=new Date(S.moStart+'T12:00:00');const year=ms.getFullYear(),month=ms.getMonth();
  const firstDay=new Date(year,month,1).getDay();const dim=new Date(year,month+1,0).getDate();const td=today();
  let cells='';for(let i=0;i<firstDay;i++)cells+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const dt=year+'-'+p2(month+1)+'-'+p2(d);const s=pStats(dt);const isT=dt===td;const hs=!!S.sentences[dt];
    const dotBg=s.t===0?'transparent':s.pct===100?'var(--green)':s.pct>=50?'var(--amber)':'var(--border2)';
    cells+=`<div class="cal-day${isT?' today':''}" data-a="goto-day" data-dt="${dt}">
      <div class="cd-num">${d}</div><div class="cd-dots"><div class="cd-dot" style="background:${dotBg}"></div>${hs?`<div class="cd-dot" style="background:var(--blue)"></div>`:''}</div>
      ${s.t>0?`<div class="cd-pct">${s.pct}%</div>`:''}
    </div>`;
  }
  const mArr=[];for(let d=1;d<=dim;d++)mArr.push(pStats(year+'-'+p2(month+1)+'-'+p2(d)));
  const mt={t:mArr.reduce((a,s)=>a+s.t,0),d:mArr.reduce((a,s)=>a+s.d,0)};
  const mp=mt.t>0?Math.round(mt.d/mt.t*100):0;
  const active=mArr.filter(s=>s.t>0).length;const perfect=mArr.filter(s=>s.t>0&&s.pct===100).length;
  const sentDays=Object.keys(S.sentences).filter(k=>k.startsWith(year+'-'+p2(month+1))).length;
  return `<div class="screen-header"><div><div class="screen-title">월간</div></div>
    <div class="date-nav-row"><button class="btn sm ghost" data-a="prev-mo">◀</button><div class="d-disp">${fmtMo(S.moStart)}</div><button class="btn sm ghost" data-a="next-mo">▶</button></div></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px">
    ${[['전체',mt.t],['달성률',mp+'%'],['활성',active+'일'],['완벽',perfect+'일']].map(([l,v])=>`<div class="stat-card"><div class="stat-n" style="font-size:18px">${v}</div><div class="stat-l">${l}</div></div>`).join('')}
  </div>
  <div style="padding:0 16px 8px"><div class="prog" style="height:4px"><div class="prog-fill" style="width:${mp}%"></div></div></div>
  <div class="cal-grid">${WD.map(w=>`<div class="cal-dow">${w}</div>`).join('')}</div>
  <div class="cal-grid">${cells}</div>
  <div style="display:flex;gap:12px;padding:8px 16px;font-size:11px;color:var(--text3);flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:var(--green)"></div>완료 100%</div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:var(--amber)"></div>50%+</div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:var(--blue)"></div>문장 ${sentDays}일</div>
  </div><div class="hint">날짜를 탭하면 일간 보기로 이동</div>`;
}

function renderHabits(){
  const td=today();const active=S.habits.filter(h=>!h.archived);
  const allDone=active.length>0&&active.every(h=>hDone(h.id,td));
  const items=active.length===0?`<div class="empty-state">아직 습관이 없습니다<br>아래에서 첫 번째 습관을 추가해보세요</div>`
    :active.map(h=>{
      const streak=hStreak(h.id);
      const cells=[];for(let i=27;i>=0;i--){const dt=addDays(td,-i);cells.push(`<div class="hm-cell${hDone(h.id,dt)?' done':''}${dt===td?' today-cell':''}"></div>`);}
      const tDone=hDone(h.id,td);
      return `<div class="habit-item">
        <div class="hi-top"><div class="hi-dot" style="background:${h.color}"></div><div class="hi-name">${esc(h.name)}</div><div class="hi-streak">${streak>0?'🔥 '+streak+'일':''}</div>
        <button class="btn sm${tDone?' pri':''}" data-a="toggle-habit-today" data-hid="${h.id}">${tDone?'완료 ✓':'오늘 체크'}</button></div>
        <div class="hi-heatmap">${cells.join('')}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:right">최근 4주</div>
      </div>`;
    }).join('');

  const swatches=COLORS.map(c=>`<div class="swatch${S.selColor===c?' selected':''}" style="background:${c}" data-a="pick-color" data-color="${c}"></div>`).join('');
  return `<div class="screen-header"><div><div class="screen-title">습관 트래커</div><div class="header-sub">작은 행동이 정체성을 만든다</div></div></div>
  <div style="padding:8px 16px 4px">${allDone?`<div class="done-banner pop-anim" style="margin:0 0 10px"><div class="done-icon">✦</div><div class="done-msg">오늘의 모든 습관을 완료!</div></div>`:''}</div>
  <div class="section">${items}</div>
  <div class="section"><div class="sec-label">새 습관 추가</div><div class="form-area">
    <div class="fgroup"><div class="flabel">습관 이름</div><input id="h-name" placeholder="예: 논문 1편, 영어 30분..."></div>
    <div class="fgroup" style="margin:0"><div class="flabel">색상</div><div class="color-swatches">${swatches}</div></div>
  </div><button class="btn full" data-a="add-habit">+ 습관 추가</button></div>`;
}

function renderMe(){
  const user=auth?auth.currentUser:null;
  return `<div class="screen-header"><div><div class="screen-title">나</div><div class="header-sub">정체성과 시스템을 설계하세요</div></div></div>
  ${user?`<div style="padding:12px 16px 0"><div class="card" style="display:flex;align-items:center;gap:12px">
    ${user.photoURL?`<img src="${user.photoURL}" style="width:40px;height:40px;border-radius:50%;flex-shrink:0">`:`<div style="width:40px;height:40px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:18px">👤</div>`}
    <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">${esc(user.displayName||'사용자')}</div><div style="font-size:12px;color:var(--text3)">${esc(user.email||'')}</div><div style="font-size:11px;color:var(--green);margin-top:2px">🔄 실시간 동기화 활성화됨</div></div>
    <button class="btn sm danger" data-a="logout">로그아웃</button>
  </div></div>`:''}
  <div class="section" style="margin-top:12px"><div class="sec-label">나의 정체성 선언</div><div class="card">
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">매일 이 문장을 보며 행동이 정체성을 만든다는 것을 기억하세요.</div>
    <textarea id="identity-inp" style="font-style:italic;font-size:15px;font-family:var(--font-serif)">${esc(S.identity)}</textarea>
    <button class="btn sm pri" data-a="save-identity" style="margin-top:8px">저장 & 동기화</button>
  </div></div>
  <div class="section"><div class="sec-label">Atomic Habits 원칙</div><div class="card" style="padding:12px 14px">
    ${[['1% 규칙','매일 1% 개선. 365일이면 37배 성장'],['정체성 기반','목표가 아닌 "나는 누구인가"에서 출발'],['시스템 설계','의지력 대신 환경과 구조로 습관 고정'],['두 번 놓치지 않기','한 번은 괜찮다. 두 번은 새 습관이 된다'],['2분 규칙','새 습관은 2분 버전으로 시작하라']].map(([t,d])=>`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)"><div style="font-size:16px;flex-shrink:0">→</div><div><div style="font-size:13px;font-weight:500">${t}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${d}</div></div></div>`).join('')}
  </div></div>`;
}

// ── Events ──
document.getElementById('screen').addEventListener('click',function(e){
  const el=e.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a;const plan=getPlan(S.date);

  if(a==='prev-day'){S.date=addDays(S.date,-1);render();}
  else if(a==='next-day'){S.date=addDays(S.date,1);render();}
  else if(a==='goto-today'){S.date=today();render();}
  else if(a==='edit-sent'){S.editSent=true;render();setTimeout(()=>{const t=document.getElementById('sent-inp');if(t){t.focus();t.selectionStart=t.value.length;}},60);}
  else if(a==='sent-cancel'){S.editSent=false;render();}
  else if(a==='sent-save'){const t=document.getElementById('sent-inp');if(t){const v=t.value.trim();if(v)S.sentences[S.date]=v;else delete S.sentences[S.date];save();}S.editSent=false;render();}
  else if(a==='open-edit'){S.editDay=true;render();document.getElementById('screen').scrollTop=0;}
  else if(a==='close-edit'){S.editDay=false;render();}
  else if(a==='save-edit'){save();S.editDay=false;render();}
  else if(a==='toggle-goal'){const i=parseInt(el.dataset.i);plan.goals[i].done=!plan.goals[i].done;save();render();}
  else if(a==='toggle-block'){const i=parseInt(el.dataset.i);const s=[...plan.blocks].sort((a,b)=>a.time.localeCompare(b.time));const o=plan.blocks.indexOf(s[i]);if(o>-1){plan.blocks[o].done=!plan.blocks[o].done;save();render();}}
  else if(a==='del-goal'){const i=parseInt(el.dataset.i);plan.goals.splice(i,1);render();}
  else if(a==='del-block'){const i=parseInt(el.dataset.i);const s=[...plan.blocks].sort((a,b)=>a.time.localeCompare(b.time));const o=plan.blocks.indexOf(s[i]);if(o>-1){plan.blocks.splice(o,1);render();}}
  else if(a==='add-goal'){const txt=document.getElementById('g-text')?.value.trim();if(!txt)return;plan.goals.push({text:txt,tag:document.getElementById('g-tag')?.value||'기타',done:false});document.getElementById('g-text').value='';render();}
  else if(a==='add-block'){const title=document.getElementById('b-title')?.value.trim();if(!title)return;plan.blocks.push({time:document.getElementById('b-time')?.value||'09:00',tag:document.getElementById('b-tag')?.value||'기타',title,detail:document.getElementById('b-detail')?.value.trim()||'',done:false});document.getElementById('b-title').value='';document.getElementById('b-detail').value='';render();}
  else if(a==='tpl'){const ti=parseInt(el.dataset.ti);const t=TEMPLATES[ti];if(!t)return;plan.blocks.push({...t,done:false});render();}
  else if(a==='save-review'){const t=document.getElementById('review-area');if(t){getPlan(S.date).review=t.value.trim();save();el.textContent='저장됨 ✓';el.disabled=true;setTimeout(()=>{el.textContent='저장';el.disabled=false;},1200);}}
  else if(a==='prev-wk'){S.wkStart=addDays(S.wkStart,-7);render();}
  else if(a==='next-wk'){S.wkStart=addDays(S.wkStart,7);render();}
  else if(a==='prev-mo'){const d=new Date(S.moStart+'T12:00:00');d.setMonth(d.getMonth()-1);S.moStart=ymd(d).slice(0,7)+'-01';render();}
  else if(a==='next-mo'){const d=new Date(S.moStart+'T12:00:00');d.setMonth(d.getMonth()+1);S.moStart=ymd(d).slice(0,7)+'-01';render();}
  else if(a==='goto-day'){const dt=el.dataset.dt;if(dt){S.date=dt;S.wkStart=weekOf(dt);S.moStart=monthOf(dt);S.tab='today';S.editDay=false;S.editSent=false;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='today'));render();document.getElementById('screen').scrollTop=0;}}
  else if(a==='toggle-habit'||a==='toggle-habit-today'){const hid=el.dataset.hid;const dt=a==='toggle-habit'?S.date:today();if(!S.habitLogs[dt])S.habitLogs[dt]=[];const idx=S.habitLogs[dt].indexOf(hid);if(idx>-1)S.habitLogs[dt].splice(idx,1);else S.habitLogs[dt].push(hid);save();render();}
  else if(a==='pick-color'){S.selColor=el.dataset.color;document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('selected',s.dataset.color===S.selColor));}
  else if(a==='add-habit'){const name=document.getElementById('h-name')?.value.trim();if(!name)return;S.habits.push({id:'h'+Date.now(),name,color:S.selColor,archived:false});document.getElementById('h-name').value='';save();render();}
  else if(a==='save-wr'){const q1=document.getElementById('wr-q1')?.value.trim()||'';const q2=document.getElementById('wr-q2')?.value.trim()||'';const q3=document.getElementById('wr-q3')?.value.trim()||'';S.weeklyReview[S.wkStart]={q1,q2,q3};save();el.textContent='저장됨 ✓';el.disabled=true;setTimeout(()=>{el.textContent='주간 회고 저장';el.disabled=false;},1200);}
  else if(a==='save-identity'){const t=document.getElementById('identity-inp');if(t){S.identity=t.value.trim()||S.identity;save();el.textContent='저장됨 ✓';el.disabled=true;setTimeout(()=>{el.textContent='저장 & 동기화';el.disabled=false;render();},1200);}}
  else if(a==='logout'){if(auth)auth.signOut();}
});

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
initFirebase();
})();
</script>
